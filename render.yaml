services:
  - type: web
    name: gemini-live-flask
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --worker-class gevent --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: '3.12.0'
