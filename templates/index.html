<!doctype html>
<html>
	<head>
		<title>ReigGrau's Gemini Live API Demo</title>
		<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='styles.css') }}"
		/>
	</head>
	<body>
		<!-- Three.js container -->
		<div id="particles-container"></div>

		<!-- Controls -->
		<div id="controls">
			<div id="ConnectButton">
				<button class="btn" id="connect-btn">
					<span class="edge"></span>
					<span class="edge"></span>
					<span class="edge"></span>
					<span class="edge"></span>
					<span class="label">Connect</span>
				</button>
			</div>
			<button id="MicButton" style="display: none" title="Mute microphone">
				<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
					<path
						id="mic-icon-path"
						d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
					/>
				</svg>
			</button>
		</div>

		<!-- Include Three.js from a CDN -->
		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
				}
			}
		</script>
		<script
			type="module"
			src="{{ url_for('static', filename='js/particles.js') }}"
		></script>
		<script
			type="module"
			src="{{ url_for('static', filename='js/main.js') }}"
		></script>
	</body>
</html>
